<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SafeScan</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f5f7;color:#1a1a1a;padding-bottom:72px}
.hdr{background:#fff;border-bottom:1px solid #e8e8e8;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}
.logo{font-size:17px;font-weight:700}.logo span{color:#22c55e}
.lbs{display:flex;gap:3px}
.lb{border:1px solid #ddd;background:#fff;color:#555;font-size:11px;padding:3px 8px;border-radius:20px;cursor:pointer}
.lb.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.panel{display:none;padding:16px;max-width:480px;margin:0 auto}
.panel.on{display:block}
.tabbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e8e8e8;display:flex;z-index:20}
.tab{flex:1;padding:10px 0 8px;text-align:center;cursor:pointer;font-size:11px;color:#aaa}
.tab.on{color:#22c55e}
.tab i{display:block;font-size:22px;margin-bottom:2px}
.upload-area{background:#fff;border:2px dashed #d0d0d0;border-radius:16px;padding:24px 20px;text-align:center;cursor:pointer;transition:.2s;margin-bottom:12px}
.upload-area:hover,.upload-area.drag{border-color:#22c55e;background:#f0fdf4}
.up-icon{font-size:36px;margin-bottom:8px}
.up-title{font-size:15px;font-weight:600}
.up-sub{font-size:12px;color:#888;margin-top:3px}
.prev-wrap{position:relative;margin-bottom:12px}
.prev-img{width:100%;max-height:200px;object-fit:cover;border-radius:12px}
.rm-btn{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:14px}
.cat-wrap{display:flex;gap:8px;margin-bottom:12px}
.cat-btn{flex:1;border:1.5px solid #e0e0e0;background:#fff;color:#555;font-size:13px;font-weight:600;padding:9px 8px;border-radius:12px;cursor:pointer}
.cat-btn.on{border-color:#22c55e;background:#f0fdf4;color:#166534}
.analyze-btn{width:100%;background:#22c55e;color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:16px}
.analyze-btn:disabled{background:#ccc;cursor:not-allowed}
.loading{text-align:center;padding:28px;display:none}
.spinner{width:32px;height:32px;border:3px solid #eee;border-top:3px solid #22c55e;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.ng-alert{background:#fee2e2;border:1.5px solid #fca5a5;border-radius:12px;padding:12px 16px;margin-bottom:12px;display:none}
.ng-alert-title{font-size:13px;font-weight:700;color:#b91c1c;margin-bottom:6px}
.summary-bar{background:#fff;border-radius:12px;padding:12px 16px;margin-bottom:10px;display:flex;align-items:center;gap:10px;border:1px solid #e8e8e8}
.sum-icon{font-size:22px}
.sum-txt{font-size:14px;font-weight:600}
.sum-sub{font-size:12px;color:#888}
.cat-label{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;margin-top:3px}
.cl-food{background:#dcfce7;color:#166534}
.cl-beauty{background:#fce7f3;color:#9d174d}
.cl-other{background:#e0e7ff;color:#3730a3}
.allergy-box{background:#fff7ed;border:1.5px solid #fdba74;border-radius:12px;padding:10px 14px;margin-bottom:10px;display:none}
.allergy-title{font-size:12px;font-weight:700;color:#c2410c;margin-bottom:5px}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.a-tag{background:#fed7aa;color:#9a3412;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}
.ng-tag{background:#fecaca;color:#991b1b;font-size:12px;font-weight:600;padding:3px 9px;border-radius:20px}
.legend{display:flex;gap:10px;margin-bottom:10px}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:#666}
.dot{width:8px;height:8px;border-radius:50%}
.dr{background:#ef4444}.dy{background:#f59e0b}.dg{background:#22c55e}
.sec-title{font-size:11px;font-weight:700;color:#888;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}
.ing-card{background:#fff;border-radius:12px;border:1px solid #e8e8e8;padding:11px 14px;margin-bottom:7px}
.ing-hdr{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.ing-name{font-size:14px;font-weight:600;flex:1}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.br{background:#fee2e2;color:#b91c1c}
.by{background:#fef3c7;color:#92400e}
.bg{background:#dcfce7;color:#166534}
.ing-desc{font-size:12px;color:#555;line-height:1.5}
.result-sec{display:none}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.panel-title{font-size:16px;font-weight:700}
.clear-btn{background:#fff;border:1px solid #fca5a5;color:#b91c1c;font-size:12px;font-weight:600;padding:5px 12px;border-radius:20px;cursor:pointer}
.hist-card{background:#fff;border-radius:12px;border:1px solid #e8e8e8;padding:12px 14px;margin-bottom:8px;cursor:pointer}
.hist-hdr{display:flex;align-items:center;gap:10px}
.hist-thumb{width:48px;height:48px;border-radius:8px;object-fit:cover;flex-shrink:0}
.hist-ph{width:48px;height:48px;border-radius:8px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.hist-info{flex:1;min-width:0}
.hist-date{font-size:11px;color:#888;margin-bottom:2px}
.hist-sum{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-risks{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;align-items:center}
.rc{font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px}
.rcr{background:#fee2e2;color:#b91c1c}
.rcy{background:#fef3c7;color:#92400e}
.rcg{background:#dcfce7;color:#166634}
.hist-detail{margin-top:10px;border-top:1px solid #f0f0f0;padding-top:10px;display:none}
.empty{text-align:center;padding:40px 20px;color:#aaa}
.empty-icon{font-size:36px;margin-bottom:8px}
.empty-txt{font-size:14px}
.ng-add-wrap{background:#fff;border-radius:12px;border:1px solid #e8e8e8;padding:12px 14px;margin-bottom:14px;display:flex;gap:8px}
.ng-input{flex:1;border:1px solid #e0e0e0;border-radius:8px;padding:8px 12px;font-size:14px;outline:none;color:#1a1a1a;background:#fff}
.ng-input:focus{border-color:#22c55e}
.ng-add-btn{background:#1a1a1a;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer}
.ng-item{background:#fff;border-radius:10px;border:1px solid #e8e8e8;padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.ng-item-name{font-size:14px;font-weight:500}
.ng-rm{background:none;border:none;color:#ccc;font-size:20px;cursor:pointer;padding:0 4px}
.ng-rm:hover{color:#ef4444}
.ng-count-badge{background:#fee2e2;color:#b91c1c;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;margin-left:4px;vertical-align:middle}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">Safe<span>Scan</span></div>
  <div class="lbs">
    <button class="lb on" onclick="setLang('ja',this)">JP</button>
    <button class="lb" onclick="setLang('en',this)">EN</button>
    <button class="lb" onclick="setLang('zh',this)">中</button>
    <button class="lb" onclick="setLang('ko',this)">한</button>
  </div>
</div>

<!-- SCAN -->
<div class="panel on" id="panel-scan">
  <div class="upload-area" id="uploadArea" onclick="document.getElementById('fi').click()">
    <div class="up-icon">📷</div>
    <div class="up-title" id="t-up-title">撮影 または ライブラリから選択</div>
    <div class="up-sub" id="t-up-sub">スマホはカメラ起動も可能・PCはドラッグ＆ドロップ対応</div>
    <input type="file" id="fi" accept="image/*" style="display:none" onchange="handleFile(this.files[0])">
  </div>
  <div class="prev-wrap" id="prevWrap" style="display:none">
    <img id="prevImg" class="prev-img" src="" alt="">
    <button class="rm-btn" onclick="removeImg()">✕</button>
  </div>
  <div class="cat-wrap">
    <button class="cat-btn on" onclick="setCat('food',this)" id="t-cat-food">🍱 食品・飲料</button>
    <button class="cat-btn" onclick="setCat('beauty',this)" id="t-cat-beauty">💄 美容・化粧品</button>
    <button class="cat-btn" onclick="setCat('other',this)" id="t-cat-other">📦 その他</button>
  </div>
  <button class="analyze-btn" id="analyzeBtn" disabled onclick="analyze()">
    <span id="t-btn">📋 成分を解析する</span>
  </button>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div style="font-size:13px;color:#666" id="t-loading">AIが成分を解析中...</div>
  </div>
  <div class="result-sec" id="resultSec">
    <div class="ng-alert" id="ngAlert">
      <div class="ng-alert-title" id="t-ng-alert-title">🚫 NGリストの成分が含まれています！</div>
      <div class="tags" id="ngAlertTags"></div>
    </div>
    <div class="summary-bar">
      <div class="sum-icon" id="sumIcon">✅</div>
      <div>
        <div class="sum-txt" id="sumTxt"></div>
        <div class="sum-sub" id="sumSub"></div>
        <span class="cat-label" id="catLabel"></span>
      </div>
    </div>
    <div class="allergy-box" id="allergyBox">
      <div class="allergy-title" id="t-allergy">⚠️ 注意成分</div>
      <div class="tags" id="allergyTags"></div>
    </div>
    <div class="legend">
      <div class="leg"><div class="dot dr"></div><span id="t-lr">要注意</span></div>
      <div class="leg"><div class="dot dy"></div><span id="t-ly">中程度</span></div>
      <div class="leg"><div class="dot dg"></div><span id="t-lg">安全</span></div>
    </div>
    <div class="sec-title" id="t-ing-title">成分一覧</div>
    <div id="ingList"></div>
  </div>
</div>

<!-- HISTORY -->
<div class="panel" id="panel-history">
  <div class="panel-hdr">
    <div class="panel-title" id="t-hist-title">スキャン履歴</div>
    <button class="clear-btn" onclick="clearHistory()" id="t-clear-btn">🗑 全消去</button>
  </div>
  <div id="histList"></div>
</div>

<!-- NG LIST -->
<div class="panel" id="panel-ng">
  <div class="panel-hdr">
    <div class="panel-title" id="t-ng-title">NGリスト</div>
  </div>
  <div class="ng-add-wrap">
    <input class="ng-input" id="ngInput" type="text" placeholder="成分名を入力..." onkeydown="if(event.key==='Enter')addNG()">
    <button class="ng-add-btn" onclick="addNG()" id="t-ng-add-btn">追加</button>
  </div>
  <div id="ngItemList"></div>
</div>

<div class="tabbar">
  <div class="tab on" onclick="showTab('scan',this)">
    <i>🔍</i><span id="t-tab-scan">スキャン</span>
  </div>
  <div class="tab" onclick="showTab('history',this)">
    <i>📋</i><span id="t-tab-hist">履歴</span>
  </div>
  <div class="tab" onclick="showTab('ng',this)">
    <i>🚫</i><span id="t-tab-ng">NGリスト<span class="ng-count-badge" id="ngCountBadge" style="display:none"></span></span>
  </div>
</div>

// Storage
function loadStorage() {
  try {
    window.storage.get('ss_history').then(function(r) {
      if (r) histData = JSON.parse(r.value);
    }).catch(function() { histData = []; });
  } catch(e) { histData = []; }
  try {
    window.storage.get('ss_nglist').then(function(r) {
      if (r) { ngItems = JSON.parse(r.value); updateNGBadge(); }
    }).catch(function() { ngItems = []; });
  } catch(e) { ngItems = []; }
}

function saveHist() {
  try { window.storage.set('ss_history', JSON.stringify(histData)); } catch(e) {}
}

function saveNG() {
  try { window.storage.set('ss_nglist', JSON.stringify(ngItems)); } catch(e) {}
}

  document.getElementById('t-allergy').textContent = '⚠️ ' + t.alertLabel;
  document.getElementById('t-lr').textContent = t.lr;
  document.getElementById('t-ly').textContent = t.ly;
  document.getElementById('t-lg').textContent = t.lg;
  document.getElementById('t-ing-title').textContent = t.ingTitle;
  document.getElementById('t-hist-title').textContent = t.histTitle;
  document.getElementById('t-clear-btn').textContent = t.clearBtn;
  document.getElementById('t-ng-title').textContent = t.ngTitle;
  document.getElementById('ngInput').placeholder = t.ngPh;
  document.getElementById('t-ng-add-btn').textContent = t.ngAdd;
  document.getElementById('t-tab-scan').textContent = t.tabScan;
  document.getElementById('t-tab-hist').textContent = t.tabHist;
  document.getElementById('t-ng-alert-title').textContent = t.ngAlertTitle;
  document.getElementById('t-cat-food').textContent = c.food;
  document.getElementById('t-cat-beauty').textContent = c.beauty;
  document.getElementById('t-cat-other').textContent = c.other;
}

// Category
function setCat(c, btn) {
  category = c;
  document.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('on'); });
  btn.classList.add('on');
}

// Tabs
function showTab(name, el) {
  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('on'); });
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('on'); });
  document.getElementById('panel-' + name).classList.add('on');
  el.classList.add('on');
  if (name === 'history') renderHistory();
  if (name === 'ng') renderNGItems();
}

// File
var ua = document.getElementById('uploadArea');
ua.addEventListener('dragover', function(e) { e.preventDefault(); ua.classList.add('drag'); });
ua.addEventListener('dragleave', function() { ua.classList.remove('drag'); });
ua.addEventListener('drop', function(e) {
  e.preventDefault();
  ua.classList.remove('drag');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    imgB64 = ev.target.result.split(',')[1];
    var img = new Image();
    img.onload = function() {
      var c = document.createElement('canvas');
      c.width = 80; c.height = 80;
      var ctx = c.getContext('2d');
      var r = Math.min(img.width, img.height);
      ctx.drawImage(img, (img.width-r)/2, (img.height-r)/2, r, r, 0, 0, 80, 80);
      imgThumb = c.toDataURL('image/jpeg', 0.5).split(',')[1];
    };
    img.src = ev.target.result;
    document.getElementById('prevImg').src = ev.target.result;
    document.getElementById('prevWrap').style.display = 'block';
    document.getElementById('uploadArea').style.display = 'none';
    document.getElementById('analyzeBtn').disabled = false;
    document.getElementById('resultSec').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function removeImg() {
  imgB64 = null; imgThumb = null;
  document.getElementById('prevWrap').style.display = 'none';
  document.getElementById('uploadArea').style.display = 'block';
  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('fi').value = '';
  document.getElementById('resultSec').style.display = 'none';
}

// Prompt
function getPrompt() {
  var t = T[lang];
  if (category === 'beauty') return t.beautyPrompt;
  if (category === 'other') return t.otherPrompt;
  return t.foodPrompt;
}

// Analyze
function analyze() {
  if (!imgB64) return;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('resultSec').style.display = 'none';
  document.getElementById('analyzeBtn').disabled = true;

  fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ imageData: imgB64, prompt: getPrompt() })
  })
  .then(function(res) {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  })
  .then(function(d) {
    if (!d.content) {
      throw new Error('APIレスポンス異常: ' + JSON.stringify(d));
    }
    var txt = d.content.map(function(i) { return i.text || ''; }).join('');
    var parsed = JSON.parse(txt.replace(/```json|```/g, '').trim());
    parsed._cat = category;
    showResult(parsed);
    addToHistory(parsed);
  })
  .catch(function(e) {
    alert('解析エラー: ' + e.message);
  })
  .finally(function() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('analyzeBtn').disabled = false;
  });
}

// NG check
function checkNG(ings) {
  if (!ngItems.length) return [];
  var found = [];
  ings.forEach(function(ing) {
    var n = ing.name.toLowerCase();
    ngItems.forEach(function(ng) {
      var nl = ng.toLowerCase();
      if ((n.includes(nl) || nl.includes(n)) && found.indexOf(ing.name) === -1) {
        found.push(ing.name);
      }
    });
  });
  return found;
}

function catInfo(c) {
  var map = {
    food: { icon:'🍱', cls:'cl-food', labels:{ja:'食品・飲料',en:'Food & Drink',zh:'食品饮料',ko:'식품·음료'} },
    beauty: { icon:'💄', cls:'cl-beauty', labels:{ja:'美容・化粧品',en:'Beauty & Cosmetics',zh:'美容化妆品',ko:'뷰티·화장품'} },
    other: { icon:'📦', cls:'cl-other', labels:{ja:'その他',en:'Other',zh:'其他',ko:'기타'} }
  };
  return map[c] || map.other;
}

// Show result
function showResult(data) {
  var t = T[lang];
  var ngFound = checkNG(data.ingredients);
  var ngAlert = document.getElementById('ngAlert');
  if (ngFound.length) {
    document.getElementById('t-ng-alert-title').textContent = t.ngAlertTitle;
    document.getElementById('ngAlertTags').innerHTML = ngFound.map(function(n) {
      return '<span class="ng-tag">' + n + '</span>';
    }).join('');
    ngAlert.style.display = 'block';
  } else {
    ngAlert.style.display = 'none';
  }

  var rc = data.ingredients.filter(function(i) { return i.risk==='red'; }).length;
  var yc = data.ingredients.filter(function(i) { return i.risk==='yellow'; }).length;
  var gc = data.ingredients.filter(function(i) { return i.risk==='green'; }).length;
  document.getElementById('sumIcon').textContent = rc > 0 ? '⚠️' : yc > 0 ? '🟡' : '✅';
  document.getElementById('sumTxt').textContent = data.summary;
  document.getElementById('sumSub').textContent = '🔴 ' + rc + '　🟡 ' + yc + '　🟢 ' + gc;

  var ci = catInfo(data._cat || category);
  var cl = document.getElementById('catLabel');
  cl.className = 'cat-label ' + ci.cls;
  cl.textContent = ci.icon + ' ' + (ci.labels[lang] || ci.labels.ja);

  var abox = document.getElementById('allergyBox');
  if (data.allergens && data.allergens.length) {
    document.getElementById('t-allergy').textContent = '⚠️ ' + t.allergenLabel;
    abox.style.display = 'block';
    document.getElementById('allergyTags').innerHTML = data.allergens.map(function(a) {
      return '<span class="a-tag">' + a + '</span>';
    }).join('');
  } else {
    abox.style.display = 'none';
  }

  document.getElementById('ingList').innerHTML = data.ingredients.map(function(ing) {
    var dc = ing.risk==='red' ? 'dr' : ing.risk==='yellow' ? 'dy' : 'dg';
    var bc = ing.risk==='red' ? 'br' : ing.risk==='yellow' ? 'by' : 'bg';
    var bt = ing.risk==='red' ? t.br : ing.risk==='yellow' ? t.by : t.bg;
    var isNG = ngItems.some(function(ng) {
      return ing.name.toLowerCase().includes(ng.toLowerCase()) || ng.toLowerCase().includes(ing.name.toLowerCase());
    });
    return '<div class="ing-card" style="' + (isNG ? 'border:1.5px solid #fca5a5;background:#fff5f5' : '') + '">'
      + '<div class="ing-hdr">'
      + '<div class="dot ' + dc + '"></div>'
      + '<div class="ing-name">' + ing.name + (isNG ? ' 🚫' : '') + '</div>'
      + '<span class="badge ' + bc + '">' + bt + '</span>'
      + '</div>'
      + '<div class="ing-desc">' + ing.reason + '</div>'
      + '</div>';
  }).join('');

  document.getElementById('resultSec').style.display = 'block';
  setTimeout(function() {
    document.getElementById('resultSec').scrollIntoView({ behavior: 'smooth' });
  }, 100);
}

// History
function addToHistory(data) {
  var ci = catInfo(data._cat || category);
  histData.unshift({
    id: Date.now(),
    date: new Date().toLocaleString('ja-JP', {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}),
    summary: data.summary,
    allergens: data.allergens || [],
    ingredients: data.ingredients,
    thumb: imgThumb || null,
    cat: data._cat || category,
    catIcon: ci.icon
  });
  if (histData.length > 30) histData = histData.slice(0, 30);
  saveHist();
}

function renderHistory() {
  var t = T[lang];
  var el = document.getElementById('histList');
  if (!histData.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><div class="empty-txt">' + t.emptyHist + '</div></div>';
    return;
  }
  el.innerHTML = histData.map(function(h, i) {
    var rc = h.ingredients.filter(function(x) { return x.risk==='red'; }).length;
    var yc = h.ingredients.filter(function(x) { return x.risk==='yellow'; }).length;
    var gc = h.ingredients.filter(function(x) { return x.risk==='green'; }).length;
    var ci = catInfo(h.cat || 'food');
    var th = h.thumb
      ? '<img class="hist-thumb" src="data:image/jpeg;base64,' + h.thumb + '" alt="">'
      : '<div class="hist-ph">' + (h.catIcon || '📦') + '</div>';
    var cLabel = '<span class="cat-label ' + ci.cls + '" style="font-size:10px;padding:1px 6px">' + ci.icon + ' ' + (ci.labels[lang] || ci.labels.ja) + '</span>';
    var detail = '';
    if (h.allergens.length) {
      detail += '<div style="margin-bottom:8px"><div style="font-size:11px;font-weight:700;color:#c2410c;margin-bottom:4px">' + t.allergenLabel + '</div><div class="tags">'
        + h.allergens.map(function(a) { return '<span class="a-tag">' + a + '</span>'; }).join('') + '</div></div>';
    }
    detail += h.ingredients.map(function(ing) {
      var bc = ing.risk==='red' ? 'br' : ing.risk==='yellow' ? 'by' : 'bg';
      var bt = ing.risk==='red' ? t.br : ing.risk==='yellow' ? t.by : t.bg;
      return '<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #f5f5f5">'
        + '<span style="font-size:13px;flex:1">' + ing.name + '</span>'
        + '<span class="badge ' + bc + '">' + bt + '</span></div>';
    }).join('');
    return '<div class="hist-card" onclick="toggleHD(' + i + ')">'
      + '<div class="hist-hdr">' + th
      + '<div class="hist-info">'
      + '<div class="hist-date">' + h.date + '</div>'
      + '<div class="hist-sum">' + (h.summary.length > 48 ? h.summary.slice(0, 48) + '…' : h.summary) + '</div>'
      + '<div class="hist-risks"><span class="rc rcr">🔴 ' + rc + '</span><span class="rc rcy">🟡 ' + yc + '</span><span class="rc rcg">🟢 ' + gc + '</span>' + cLabel + '</div>'
      + '</div></div>'
      + '<div class="hist-detail" id="hd-' + i + '">' + detail + '</div>'
      + '</div>';
  }).join('');
}

function toggleHD(i) {
  var el = document.getElementById('hd-' + i);
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

function clearHistory() {
  if (!confirm(T[lang].clearConfirm)) return;
  histData = [];
  saveHist();
  renderHistory();
}

// NG List
function addNG() {
  var input = document.getElementById('ngInput');
  var val = input.value.trim();
  if (!val || ngItems.indexOf(val) !== -1) { input.value = ''; return; }
  ngItems.push(val);
  saveNG();
  renderNGItems();
  updateNGBadge();
  input.value = '';
}

function removeNG(i) {
  ngItems.splice(i, 1);
  saveNG();
  renderNGItems();
  updateNGBadge();
}

function renderNGItems() {
  var el = document.getElementById('ngItemList');
  if (!ngItems.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🚫</div><div class="empty-txt">' + T[lang].emptyNg + '</div></div>';
    return;
  }
  el.innerHTML = ngItems.map(function(item, i) {
    return '<div class="ng-item"><span class="ng-item-name">' + item + '</span>'
      + '<button class="ng-rm" onclick="removeNG(' + i + ')">×</button></div>';
  }).join('');
}

function updateNGBadge() {
  var b = document.getElementById('ngCountBadge');
  if (ngItems.length > 0) { b.textContent = ngItems.length; b.style.display = 'inline'; }
  else { b.style.display = 'none'; }
}

loadStorage();
</script>
